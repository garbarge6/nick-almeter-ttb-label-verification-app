<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TTB Label Verification</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <h1>TTB Label Verification</h1>
      </header>

      <nav class="mode-tabs" role="tablist" aria-label="Choose verification mode">
        <button id="single-tab" class="mode-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="single-panel">Single Label</button>
        <button id="batch-tab" class="mode-tab" type="button" role="tab" aria-selected="false" aria-controls="batch-panel">Batch</button>
      </nav>

      <section id="single-panel" class="form-section" role="tabpanel" aria-labelledby="single-tab">
        <h2 id="form-title">Check One Label</h2>

        <form id="verify-form" novalidate>
          <div class="field image-field">
            <label for="label-image">Label Image</label>
            <input id="label-image" name="image" type="file" accept="image/png,image/jpeg,image/webp">
            <div id="selected-file" class="selected-file" aria-live="polite">No image selected</div>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="brand-name">Brand Name</label>
              <input id="brand-name" name="brand_name" type="text" autocomplete="off">
            </div>

            <div class="field">
              <label for="product-class">Product Class</label>
              <input id="product-class" name="product_class" type="text" autocomplete="off">
            </div>

            <div class="field">
              <label for="producer-name">Producer Name</label>
              <input id="producer-name" name="producer_name" type="text" autocomplete="off">
            </div>

            <div class="field">
              <label for="country-origin">Country of Origin</label>
              <input id="country-origin" name="country_of_origin" type="text" autocomplete="off">
            </div>

            <div class="field">
              <label for="alcohol-percent">Alcohol %</label>
              <input id="alcohol-percent" name="abv" type="text" autocomplete="off">
            </div>

            <div class="field">
              <label for="bottle-size">Bottle Size</label>
              <input id="bottle-size" name="net_contents" type="text" autocomplete="off">
            </div>
          </div>

          <div class="field">
            <label for="government-warning">Government Warning</label>
            <textarea id="government-warning" name="government_warning" rows="6"></textarea>
          </div>

          <div id="form-message" class="message" role="alert" hidden></div>

          <button id="submit-button" class="submit-button" type="submit">CHECK LABEL</button>
        </form>
      </section>

      <section id="batch-panel" class="form-section" role="tabpanel" aria-labelledby="batch-tab" hidden>
        <h2 id="batch-title">Check a Batch</h2>
        <div id="batch-message" class="message" role="alert" hidden></div>
        <div id="batch-items" class="batch-items"></div>
        <div class="batch-actions">
          <button id="add-batch-item" class="secondary-button" type="button">ADD LABEL</button>
          <button id="batch-submit-button" class="submit-button" type="button">CHECK ALL LABELS</button>
        </div>
      </section>

      <section id="loading-state" class="loading-state" aria-live="polite" aria-busy="true" hidden>
        <div class="loader" aria-hidden="true"></div>
        <div>
          <h2 id="loading-title">Checking the label...</h2>
          <p id="loading-text">This may take a few seconds.</p>
        </div>
      </section>

      <section id="results-section" class="results-section" aria-labelledby="results-title" hidden>
        <div id="verdict-banner" class="verdict-banner">
          <h2 id="results-title">Result</h2>
          <div id="verdict-text" class="verdict-text"></div>
          <div id="latency-text" class="latency-text"></div>
        </div>

        <div id="field-results" class="field-results"></div>
      </section>

      <section id="batch-results-section" class="results-section" aria-labelledby="batch-results-title" hidden>
        <div class="verdict-banner batch-summary-banner">
          <h2 id="batch-results-title">Batch Summary</h2>
          <div id="batch-summary-counts" class="summary-grid"></div>
          <div id="batch-latency-text" class="latency-text"></div>
        </div>
        <div id="batch-results" class="batch-results"></div>
      </section>
    </main>
  </body>
</html>
